services:
  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:latest
    restart: "no"
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_USER: ${KEYCLOAK_USER}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_PASSWORD}
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: ${KEYCLOAK_AVAILABILITYCHECK_ENABLED:-true}
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: ${KEYCLOAK_AVAILABILITYCHECK_TIMEOUT:-120s}
      IMPORT_FILES_LOCATIONS: /config/*
      IMPORT_VALIDATE: ${IMPORT_VALIDATE:-true}
      IMPORT_VAR_SUBSTITUTION_ENABLED: ${IMPORT_VAR_SUBSTITUTION_ENABLED:-false}
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    volumes:
      - ../keycloak/realm:/config:ro
